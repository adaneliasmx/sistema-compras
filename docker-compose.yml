version: '3.8'
services:
  app:
    image: node:20
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run init-db && npm start"
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: cambia-esta-clave
      DB_PATH: ./database/app.db
