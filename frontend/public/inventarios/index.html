<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Inventarios</title>
  <link rel="stylesheet" href="/inventarios/app.css"/>
</head>
<body>
  <div id="app">
    <!-- Login -->
    <div id="view-login" class="login-wrap" style="display:none">
      <div class="login-box">
        <div class="login-logo">📦</div>
        <h2>Inventarios</h2>
        <p class="login-sub">Control de inventarios de proceso</p>
        <div id="login-error" class="login-error" style="display:none"></div>
        <input type="email" id="login-email" class="form-input" placeholder="Correo electrónico" autocomplete="username"/>
        <input type="password" id="login-pass" class="form-input" placeholder="Contraseña" autocomplete="current-password"/>
        <button id="login-btn" class="btn btn-primary btn-block">Entrar</button>
      </div>
    </div>

    <!-- Main app -->
    <div id="view-main" style="display:none">
      <nav class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-icon">📦</span>
          <div>
            <div class="sidebar-title">Inventarios</div>
            <div class="sidebar-user" id="sidebar-user"></div>
          </div>
        </div>
        <ul class="sidebar-nav" id="sidebar-nav"></ul>
        <div class="sidebar-footer">
          <button class="sidebar-link" id="btn-change-pass">🔑 Cambiar contraseña</button>
          <button class="sidebar-link" id="btn-logout">← Salir</button>
        </div>
      </nav>

      <main class="main-content" id="main-content">
        <div class="page-loading">Cargando...</div>
      </main>
    </div>
  </div>

  <!-- Modal genérico -->
  <div id="modal-overlay" class="modal-overlay" style="display:none">
    <div class="modal-box" id="modal-box">
      <div class="modal-header">
        <span id="modal-title" class="modal-title"></span>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="/inventarios/app.js"></script>
</body>
</html>
