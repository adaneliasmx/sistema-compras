<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mantenimiento</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    /* ── Variables de color del módulo ── */
    :root {
      --mant-primary:   #0f172a;
      --mant-accent:    #f97316;
      --mant-alta:      #dc2626;
      --mant-media:     #f59e0b;
      --mant-baja:      #22c55e;
      --mant-cerrada:   #6b7280;
    }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f1f5f9; margin: 0; }
    #app { min-height: 100vh; }

    /* Navbar */
    .mant-nav {
      background: var(--mant-primary);
      color: white;
      display: flex;
      align-items: center;
      gap: 0;
      padding: 0;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .mant-nav-brand {
      padding: 12px 20px;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: .3px;
      border-right: 1px solid rgba(255,255,255,.1);
      white-space: nowrap;
    }
    .mant-nav-links { display: flex; flex: 1; overflow-x: auto; }
    .mant-nav-btn {
      padding: 14px 16px;
      background: none;
      border: none;
      color: rgba(255,255,255,.7);
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    .mant-nav-btn:hover  { color: white; background: rgba(255,255,255,.07); }
    .mant-nav-btn.active { color: var(--mant-accent); border-bottom-color: var(--mant-accent); font-weight: 600; }
    .mant-nav-user {
      padding: 8px 16px;
      font-size: 12px;
      color: rgba(255,255,255,.6);
      margin-left: auto;
      white-space: nowrap;
      border-left: 1px solid rgba(255,255,255,.1);
    }

    /* Layout principal */
    .mant-main { padding: 20px; max-width: 1200px; margin: 0 auto; }

    /* Cards de urgencia */
    .urgencia-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .urgencia-alta   { background: #fef2f2; color: var(--mant-alta);   border: 1px solid #fca5a5; }
    .urgencia-media  { background: #fffbeb; color: var(--mant-media);  border: 1px solid #fde68a; }
    .urgencia-baja   { background: #f0fdf4; color: var(--mant-baja);   border: 1px solid #86efac; }
    .status-abierta  { background: #fef2f2; color: #dc2626; }
    .status-asignada { background: #eff6ff; color: #2563eb; }
    .status-proceso  { background: #f5f3ff; color: #7c3aed; }
    .status-cerrada    { background: #f1f5f9; color: #6b7280; }
    .status-validacion { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }

    /* Tabla de órdenes */
    .mant-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .mant-table th { background: #f8fafc; padding: 8px 12px; text-align: left; font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: .4px; border-bottom: 2px solid #e2e8f0; }
    .mant-table td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }
    .mant-table tr:hover td { background: #f8fafc; }

    /* Alertas */
    .mant-alert-urgente {
      position: fixed;
      top: 70px;
      right: 20px;
      z-index: 2000;
      background: #dc2626;
      color: white;
      border-radius: 10px;
      padding: 14px 18px;
      box-shadow: 0 4px 20px rgba(220,38,38,.4);
      max-width: 320px;
      animation: slideIn .3s ease;
    }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Gantt */
    .gantt-wrap { overflow-x: auto; }
    .gantt-grid { display: grid; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; font-size: 12px; }
    .gantt-header { background: #f8fafc; font-weight: 600; color: #374151; }
    .gantt-row-label { padding: 8px 12px; background: #fafafa; border-right: 1px solid #e2e8f0; white-space: nowrap; }
    .gantt-cell { border-right: 1px solid #f1f5f9; border-top: 1px solid #f1f5f9; }
    .gantt-bar { height: 20px; border-radius: 3px; margin: 4px 2px; }
    .gantt-bar-ok       { background: #22c55e; }
    .gantt-bar-prox     { background: #3b82f6; }
    .gantt-bar-vencido  { background: #dc2626; }
    .gantt-bar-futuro   { background: #e2e8f0; }

    /* Form */
    .mant-form-group { margin-bottom: 14px; }
    .mant-form-group label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 4px; }
    .mant-form-group input,
    .mant-form-group select,
    .mant-form-group textarea { width: 100%; box-sizing: border-box; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; }
    .mant-form-group textarea { resize: vertical; min-height: 80px; }

    /* Login */
    .mant-login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--mant-primary); }
    .mant-login-box { background: white; border-radius: 14px; padding: 36px 32px; width: 340px; box-shadow: 0 8px 40px rgba(0,0,0,.3); }
    .mant-login-box h2 { margin: 0 0 6px; font-size: 20px; }
    .mant-login-box p { margin: 0 0 24px; font-size: 13px; color: #6b7280; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.min.js"></script>
  <script src="/mantenimiento/app.js"></script>
</body>
</html>
